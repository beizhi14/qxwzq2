
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>势点五子棋 · 公平规则</title>
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <style>
        /* 样式完全不变，保持原样 */
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: url('nina.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        .game-container {
            background: #e8d5b5;
            background-image: radial-gradient(circle at 25% 20%, #f3e9ce 2px, transparent 2px),
                              radial-gradient(circle at 75% 80%, #f3e9ce 2px, transparent 2px);
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px #b59e7c inset;
            border-radius: 40px;
            padding: 30px 30px 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-panel {
            background: #2f4f4c;
            border-radius: 60px;
            padding: 12px 28px;
            box-shadow: 0 6px 0 #1a2f2c, 0 8px 12px rgba(0, 0, 0, 0.3);
            color: #f2e1c0;
            font-weight: 600;
            display: flex;
            gap: 36px;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .score-label {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .black-dot, .white-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            box-shadow: 0 3px 3px rgba(0,0,0,0.4);
        }

        .black-dot {
            background: radial-gradient(circle at 35% 35%, #666, #1e1e1e);
            border: 1px solid #888;
        }

        .white-dot {
            background: radial-gradient(circle at 35% 35%, #f4f4f4, #bdbdbd);
            border: 1px solid #ddd;
        }

        .score-number {
            font-size: 28px;
            line-height: 1;
            margin-left: 6px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            color: #fadf9e;
            text-shadow: 0 2px 0 #7a5f3c;
            min-width: 40px;
            text-align: center;
        }

        .threshold-badge {
            background: #4e3e2b;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 15px;
            font-weight: 500;
            color: #efd496;
            letter-spacing: 0.5px;
            box-shadow: inset 0 1px 3px #1f180f;
        }

        .turn-indicator {
            background: #c9ab7e;
            border-radius: 40px;
            padding: 8px 22px;
            font-size: 18px;
            font-weight: 700;
            color: #2e4a3f;
            box-shadow: 0 4px 0 #8f7557, 0 6px 12px black;
            border: 1px solid #edcfa2;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.7), 0 0 0 4px #b48b5a, 0 0 0 8px #634f36;
            background: #ebc28b;
            cursor: pointer;
            width: 540px;
            height: 540px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 12px;
        }

        .btn-reset {
            background: #b6462c;
            border: none;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 36px;
            border-radius: 50px;
            box-shadow: 0 7px 0 #732919, 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.06s linear;
            letter-spacing: 1px;
            border: 1px solid #ff9469;
        }

        .btn-reset:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #732919, 0 5px 12px black;
        }

        .winner-message {
            background: #e5d3b0;
            border-radius: 40px;
            padding: 10px 26px;
            font-size: 26px;
            font-weight: 800;
            color: #2e3820;
            text-shadow: 2px 2px 0 #c9a96b;
            box-shadow: inset 0 -2px 5px #a28b62, 0 8px 0 #7a6240;
        }

        .rule-hint {
            color: #f2e1c0;
            font-weight: 500;
            background: #2f4f4c;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bgmAudio" loop preload="auto">
        <source src="bjyy.mp3" type="audio/mpeg">
    </audio>

    <!-- 背景音乐控制按钮 -->
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
        <button id="bgmToggle" style="background: #2f4f4c; color: white; border: none; border-radius: 30px; padding: 10px 20px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #1a2f2c; transition: 0.1s;">
            🔇 背景音乐
        </button>
    </div>

    <div class="game-container">
        <div class="header">
            <div class="score-panel">
                <div class="score-item">
                    <span class="score-label"><span class="black-dot"></span>黑·势</span>
                    <span class="score-number" id="blackScore">0</span>
                    <span class="threshold-badge">/6</span>
                </div>
                <div class="score-item">
                    <span class="score-label"><span class="white-dot"></span>白·势</span>
                    <span class="score-number" id="whiteScore">0</span>
                    <span class="threshold-badge">/5</span>
                </div>
            </div>
            <div class="turn-indicator" id="turnIndicator">⚫ 黑棋走</div>
        </div>

        <canvas id="boardCanvas" width="540" height="540"></canvas>

        <div class="footer">
            <div class="rule-hint">⚡活三/冲四被堵+1势</div>
            <button class="btn-reset" id="resetBtn">↺ 新一局</button>
            <div class="winner-message" id="winMessage"></div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('boardCanvas');
            const ctx = canvas.getContext('2d');
            
            const WIN_SCORE = { black: 6, white: 5 };
            const BOARD_SIZE = 15;
            const CELL_SIZE = canvas.width / BOARD_SIZE;

            let board = [];
            let currentPlayer = 1;
            let gameOver = false;
            let winner = null;
            let blackPower = 0;
            let whitePower = 0;
            let scoredPositions = new Set();

            function initBoard() {
                board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
                blackPower = 0;
                whitePower = 0;
                currentPlayer = 1;
                gameOver = false;
                winner = null;
                scoredPositions.clear();
                updateUI();
                drawBoard();
            }

            function drawBoard() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = '#3e2e1a';
                for (let i = 0; i < BOARD_SIZE; i++) {
                    const pos = i * CELL_SIZE + CELL_SIZE/2;
                    ctx.beginPath();
                    ctx.moveTo(CELL_SIZE/2, pos);
                    ctx.lineTo(canvas.width - CELL_SIZE/2, pos);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(pos, CELL_SIZE/2);
                    ctx.lineTo(pos, canvas.height - CELL_SIZE/2);
                    ctx.stroke();
                }
                
                const stars = [[7,7], [3,3], [11,3], [3,11], [11,11]];
                ctx.fillStyle = '#3e2e1a';
                stars.forEach(([x,y]) => {
                    ctx.beginPath();
                    ctx.arc(x * CELL_SIZE + CELL_SIZE/2, y * CELL_SIZE + CELL_SIZE/2, 5, 0, 2*Math.PI);
                    ctx.fill();
                });

                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (board[r][c] === 0) continue;
                        const x = c * CELL_SIZE + CELL_SIZE/2;
                        const y = r * CELL_SIZE + CELL_SIZE/2;
                        ctx.shadowColor = '#00000060';
                        ctx.shadowBlur = 10;
                        ctx.shadowOffsetX = 3;
                        ctx.shadowOffsetY = 3;
                        const gradient = ctx.createRadialGradient(x-8, y-8, 8, x, y, CELL_SIZE*0.7);
                        if (board[r][c] === 1) {
                            gradient.addColorStop(0, '#aaa');
                            gradient.addColorStop(0.6, '#222');
                            gradient.addColorStop(1, '#000');
                        } else {
                            gradient.addColorStop(0, '#fafafa');
                            gradient.addColorStop(0.6, '#ddd');
                            gradient.addColorStop(1, '#aaa');
                        }
                        ctx.beginPath();
                        ctx.arc(x, y, CELL_SIZE*0.4, 0, 2*Math.PI);
                        ctx.fillStyle = gradient;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;
                        ctx.beginPath();
                        ctx.arc(x-5, y-5, 6, 0, 2*Math.PI);
                        ctx.fillStyle = board[r][c] === 1 ? '#ffffff30' : '#ffffffb0';
                        ctx.fill();
                    }
                }
            }

            function isValid(r, c) {
                return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE;
            }

            function updatePowerAfterMove() {
                const dirs = [[1,0], [0,1], [1,1], [1,-1]];
                let visitedDir = new Set();
                
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (board[r][c] === 0) continue;
                        const player = board[r][c];
                        for (let [dx, dy] of dirs) {
                            let key = `${r},${c},${dx},${dy}`;
                            if (visitedDir.has(key)) continue;
                            
                            let startR = r, startC = c;
                            while (isValid(startR - dx, startC - dy) && board[startR - dx][startC - dy] === player) {
                                startR -= dx; startC -= dy;
                            }
                            let endR = r, endC = c;
                            while (isValid(endR + dx, endC + dy) && board[endR + dx][endC + dy] === player) {
                                endR += dx; endC += dy;
                            }
                            let len = Math.max(Math.abs(endR - startR), Math.abs(endC - startC)) + 1;
                            
                            let rr = startR, cc = startC;
                            while (true) {
                                visitedDir.add(`${rr},${cc},${dx},${dy}`);
                                if (rr === endR && cc === endC) break;
                                rr += dx; cc += dy;
                            }
                            
                            let beforeR = startR - dx, beforeC = startC - dy;
                            let afterR = endR + dx, afterC = endC + dy;
                            
                            let beforeEmpty = isValid(beforeR, beforeC) && board[beforeR][beforeC] === 0;
                            let afterEmpty = isValid(afterR, afterC) && board[afterR][afterC] === 0;
                            let beforeBlocked = !isValid(beforeR, beforeC) || (board[beforeR] && board[beforeR][beforeC] !== 0 && board[beforeR][beforeC] !== player);
                            let afterBlocked = !isValid(afterR, afterC) || (board[afterR] && board[afterR][afterC] !== 0 && board[afterR][afterC] !== player);
                            
                            if (len === 3 && beforeEmpty && afterEmpty && (beforeBlocked || afterBlocked)) {
                                let threatId = `${startR},${startC},${endR},${endC},liveThree`;
                                if (!scoredPositions.has(threatId)) {
                                    scoredPositions.add(threatId);
                                    if (player === 1) blackPower++; else whitePower++;
                                }
                            }
                            
                            if (len === 4) {
                                let isRushFour = (beforeBlocked && afterEmpty) || (afterBlocked && beforeEmpty);
                                let isLiveFour = beforeEmpty && afterEmpty;
                                if (isRushFour || isLiveFour) {
                                    let threatId = `${startR},${startC},${endR},${endC},rushFour`;
                                    if (!scoredPositions.has(threatId)) {
                                        scoredPositions.add(threatId);
                                        if (player === 1) blackPower++; else whitePower++;
                                    }
                                }
                            }
                        }
                    }
                }
            }

            function checkWin(row, col, player) {
                const dirs = [[1,0], [0,1], [1,1], [1,-1]];
                for (let [dx, dy] of dirs) {
                    let count = 1;
                    for (let step = 1; step < 5; step++) {
                        const nr = row + dx * step, nc = col + dy * step;
                        if (!isValid(nr, nc) || board[nr][nc] !== player) break;
                        count++;
                    }
                    for (let step = 1; step < 5; step++) {
                        const nr = row - dx * step, nc = col - dy * step;
                        if (!isValid(nr, nc) || board[nr][nc] !== player) break;
                        count++;
                    }
                    if (count >= 5) return true;
                }
                return false;
            }

            // ========== 修正后的核心逻辑 ==========
            function handlePlace(row, col) {
                if (gameOver) return false;
                if (!isValid(row, col) || board[row][col] !== 0) return false;

                // 模拟落子，检查是否会形成五子连珠
                board[row][col] = currentPlayer;
                const fiveInRow = checkWin(row, col, currentPlayer);
                
                // 判断当前玩家是否势点达标（使用更新前的势点值，因为势点尚未更新）
                const active = (currentPlayer === 1 && blackPower >= WIN_SCORE.black) ||
                               (currentPlayer === 2 && whitePower >= WIN_SCORE.white);

                if (fiveInRow && !active) {
                    // 势点不足却想连五：禁止落子，恢复棋盘
                    board[row][col] = 0;
                    alert('势点不足，还不能连五！请先积累势点。');
                    return false;
                }

                // 允许落子，正式生效（棋盘已更新）
                if (fiveInRow && active) {
                    // 势点达标且连五，直接获胜
                    gameOver = true;
                    winner = currentPlayer === 1 ? 'black' : 'white';
                    drawBoard();
                    updateUI();
                    return true;
                }

                // 未获胜，更新势点（因为落子已经正式生效）
                updatePowerAfterMove();

                // 切换玩家
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                drawBoard();
                updateUI();
                return true;
            }

            function updateUI() {
                document.getElementById('blackScore').innerText = blackPower;
                document.getElementById('whiteScore').innerText = whitePower;
                
                if (gameOver && winner) {
                    document.getElementById('turnIndicator').innerText = winner === 'black' ? '🏆 黑胜' : '🏆 白胜';
                    document.getElementById('winMessage').innerText = winner === 'black' ? '⚫ 黑方胜利' : '⚪ 白方胜利';
                } else {
                    document.getElementById('turnIndicator').innerHTML = currentPlayer === 1 ? '⚫ 黑棋走' : '⚪ 白棋走';
                    document.getElementById('winMessage').innerText = '';
                }
            }

            canvas.addEventListener('click', (e) => {
                if (gameOver) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                const mouseX = (e.clientX - rect.left) * scaleX;
                const mouseY = (e.clientY - rect.top) * scaleY;
                
                const col = Math.floor(mouseX / CELL_SIZE);
                const row = Math.floor(mouseY / CELL_SIZE);
                
                if (row >= 0 && row < BOARD_SIZE && col >=0 && col < BOARD_SIZE) {
                    handlePlace(row, col);
                }
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                initBoard();
                drawBoard();
            });

            // 背景音乐控制
            const bgmAudio = document.getElementById('bgmAudio');
            const bgmToggle = document.getElementById('bgmToggle');
            let bgmPlaying = false;

            bgmToggle.addEventListener('click', function() {
                if (bgmPlaying) {
                    bgmAudio.pause();
                    bgmToggle.innerHTML = '🔇 背景音乐';
                } else {
                    bgmAudio.play().catch(e => {
                        console.log('背景音乐播放失败:', e);
                        alert('点击页面任意位置后，再点击此按钮播放音乐（浏览器限制自动播放）');
                    });
                    bgmToggle.innerHTML = '🔊 背景音乐';
                }
                bgmPlaying = !bgmPlaying;
            });

            // 注册 Service Worker (PWA)
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW 注册失败:', err));
                });
            }

            initBoard();
            drawBoard();
        })();
    </script>
</body>
</html>
